<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Online Bouwmanager 2026</title>
    <link rel="stylesheet" href="styles.css"/>
</head>

<body>

<header class="header">
    <h1>Online Bouwmanager 2026</h1>
    <p>Professionele bouwkosten calculator</p>
</header>

<section class="grid">

    <div class="card">
        <h2>Project</h2>
        <input id="projectName" placeholder="Projectnaam"/>
        <input id="projectBudget" type="number" placeholder="Budget (€)"/>

        <select id="regionFactor">
            <option value="0.95">Noord</option>
            <option value="0.97">Oost</option>
            <option value="1.00" selected>Zuid</option>
            <option value="1.10">West</option>
            <option value="1.15">Randstad</option>
        </select>

        <button onclick="saveProject()">Opslaan</button>
    </div>

    <div class="card">
        <h2>Kost toevoegen</h2>

        <select id="category"></select>
        <select id="description"></select>

        <input id="quantity" type="number" placeholder="Aantal"/>

        <button onclick="addCost()">Toevoegen</button>
    </div>

    <div class="card summary">
        <h2>Overzicht</h2>
        <p>Direct: <span id="directCost">€0</span></p>
        <p>AK: <span id="ak">€0</span></p>
        <p>W&R: <span id="wr">€0</span></p>
        <p>BTW: <span id="btw">€0</span></p>
        <h3>Totaal: <span id="total">€0</span></h3>
    </div>

</section>

<section class="table">
    <table>
        <thead>
        <tr>
            <th>Categorie</th>
            <th>Omschrijving</th>
            <th>Eenheid</th>
            <th>Aantal</th>
            <th>Prijs</th>
            <th>Totaal</th>
            <th></th>
        </tr>
        </thead>
        <tbody id="rows"></tbody>
    </table>
</section>

<script src="app.js"></script>
</body>
</html>
